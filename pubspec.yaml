name: employee_portal
description: "Internal Employee Portal - Enterprise Flutter Application"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Backend
  supabase_flutter: ^2.5.6

  # UI & Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0

  # Functional Programming
  dartz: ^0.10.1

  # Utils
  intl: 0.20.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  http: ^1.2.1
  timeago: ^3.6.1
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  uuid: ^4.4.0
  device_preview: ^1.3.1
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  image: ^4.8.0

# ─── Launcher Icons Config ────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo_final.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # Fonts are loaded from Google Fonts package
  # No local font files needed
